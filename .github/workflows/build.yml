name: Build

on:
  push:
    branches: [main]
    tags: ['release/v*']
  pull_request:
    branches: [main]

# softprops/action-gh-release needs contents:write to create the Release.
# The default GITHUB_TOKEN is read-only since GitHub tightened defaults.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # --- Toolchains ---

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - uses: microsoft/setup-msbuild@v2

      - uses: dtolnay/rust-toolchain@stable

      # --- C++ (must build first — Rust links against PenSession.Native.lib) ---

      - name: Build C++ (PenSession.Native + Scribble.Win32)
        run: msbuild NativeCpp.sln -p:Configuration=Release -p:Platform=x64 -p:PlatformToolset=v143 -m

      # --- .NET ---
      # WinUI requires msbuild due to a .NET 10 preview gap: the ExpandPriContent
      # PRI task DLL is missing from the dotnet CLI SDK.

      - name: Build .NET
        run: dotnet build WinPenSession.slnx -c Release

      - name: Build WinUI (msbuild)
        run: |
          msbuild PenSession.WinUI/PenSession.WinUI.csproj -p:Configuration=Release -p:Platform=x64 -restore
          msbuild Scribble.WinUI/Scribble.WinUI.csproj -p:Configuration=Release -p:Platform=x64 -restore

      # --- Rust ---

      - name: Build Rust
        working-directory: Scribble.Rust
        env:
          RUSTFLAGS: -L native=${{ github.workspace }}/PenSession.Native/bin/Release/x64
        run: cargo build --release

      - name: Copy PenSession.Native.dll to Rust output
        run: copy PenSession.Native\bin\Release\x64\PenSession.Native.dll Scribble.Rust\target\release\

      # --- Artifacts ---

      - name: Stage release artifacts
        if: startsWith(github.ref, 'refs/tags/release/v')
        shell: bash
        run: |
          set -x
          echo "DIAG: staging script start"
          mkdir -p artifacts/PenSession.Native
          mkdir -p artifacts/PenSession.Managed
          mkdir -p artifacts/Scribble.Win32
          mkdir -p artifacts/Scribble.Rust
          mkdir -p artifacts/Scribble.WinUI
          mkdir -p artifacts/Scribble.Wpf
          mkdir -p artifacts/Scribble.WinForms
          mkdir -p artifacts/Scribble.Avalonia

          # Native DLL + headers
          cp PenSession.Native/bin/Release/x64/PenSession.Native.dll artifacts/PenSession.Native/
          cp PenSession.Native/bin/Release/x64/PenSession.Native.lib artifacts/PenSession.Native/
          cp PenSession.Native/include/pen_session.h artifacts/PenSession.Native/

          # Managed library DLLs — pre-NuGet stopgap for .NET consumers.
          # Ships every PenSession.* assembly + PDBs + xmldoc (if generated).
          # Consumers reference whichever subset they need via <Reference HintPath>.
          # The .dll is required (fail loudly if missing); .pdb/.xml are
          # optional — only copied if they exist.
          stage_managed_dll() {
            local src_dir="$1"
            local name="$2"
            cp "$src_dir/$name.dll" artifacts/PenSession.Managed/
            for ext in pdb xml; do
              [ -f "$src_dir/$name.$ext" ] && cp "$src_dir/$name.$ext" artifacts/PenSession.Managed/
            done
          }
          for proj in PenSession PenSession.Wpf PenSession.WinForms PenSession.Avalonia; do
            stage_managed_dll "$proj/bin/Release/net10.0-windows" "$proj"
          done
          # WinUI builds via msbuild -p:Platform=x64 → different output path.
          winui_dir=$(echo PenSession.WinUI/bin/x64/Release/net10.0-windows*)
          stage_managed_dll "$winui_dir" PenSession.WinUI

          # Scribble.Win32
          cp Scribble.Win32/bin/Release/x64/*.exe artifacts/Scribble.Win32/
          cp PenSession.Native/bin/Release/x64/PenSession.Native.dll artifacts/Scribble.Win32/

          # Scribble.Rust
          cp Scribble.Rust/target/release/scribble-rust.exe artifacts/Scribble.Rust/
          cp Scribble.Rust/target/release/PenSession.Native.dll artifacts/Scribble.Rust/

          # Managed scribble apps — publish self-contained output.
          # WinUI uses msbuild with -p:Platform=x64 so its output sits under
          # bin/x64/Release/, unlike the others which use plain `dotnet build`.
          for app in Scribble.Wpf Scribble.WinForms Scribble.Avalonia; do
            cp -r "$app"/bin/Release/net10.0-windows*/* "artifacts/$app/"
          done
          cp -r Scribble.WinUI/bin/x64/Release/net10.0-windows*/* artifacts/Scribble.WinUI/

      - name: Upload build artifacts
        if: startsWith(github.ref, 'refs/tags/release/v')
        uses: actions/upload-artifact@v4
        with:
          name: WinPenSession-release
          path: artifacts/

      # --- GitHub Release ---
      # One zip per top-level folder in artifacts/ becomes one downloadable
      # asset on the Release page. Keeps per-app downloads clean.

      - name: Zip release assets
        if: startsWith(github.ref, 'refs/tags/release/v')
        shell: bash
        working-directory: artifacts
        run: |
          for dir in */; do
            name="${dir%/}"
            7z a -tzip "../$name.zip" "$dir"*
          done
          ls -la ../*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/release/v')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') || contains(github.ref, '-alpha') }}
